<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eagl.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1e24;--bg2:#20262e;--bg3:#262d36;--bg4:#2e3640;
  --line:rgba(255,255,255,0.07);
  --green:#2ecc71;--gdim:rgba(46,204,113,0.12);--gring:rgba(46,204,113,0.30);
  --gold:#F5C842;--blue:#5AACFF;--red:#FF5252;
  --t:#ffffff;--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.25);
}
html,body{height:100%;background:#0e1014;display:flex;justify-content:center;align-items:center;font-family:'DM Sans',sans-serif;overflow:hidden}
.phone{width:100%;max-width:390px;height:100%;max-height:844px;background:var(--bg);border-radius:44px;overflow:hidden;display:flex;flex-direction:column;position:relative;border:8px solid #12161a;box-shadow:0 0 0 1px #2a313b,0 48px 96px rgba(0,0,0,0.9)}
@media(max-width:420px){.phone{border-radius:0;border:none;max-height:100%}}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;background:var(--bg)}
.screen.active{display:flex}
.scroll{overflow-y:auto;flex:1;padding-bottom:88px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.sb{display:flex;justify-content:space-between;padding:14px 24px 0;font-size:12px;font-weight:500;color:var(--t2)}
.hdr{padding:8px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--t);border:none}
.av{width:36px;height:36px;border-radius:50%;background:var(--gdim);border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--green);cursor:pointer}
.bnav{display:flex;border-top:0.5px solid var(--line);background:var(--bg);padding:6px 0 22px;position:absolute;bottom:0;left:0;right:0}
